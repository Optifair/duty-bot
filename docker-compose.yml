services:
  duty-bot:
    build: .
    restart: unless-stopped
    ports:
      - "8765:8000"
    environment:
      - MM_WEBHOOK_URL=${MM_WEBHOOK_URL}
      - DATABASE_URL=${DATABASE_URL}
      - DUTY_PEOPLE=${DUTY_PEOPLE}
      - POST_HOUR=${POST_HOUR:-9}
      - POST_MINUTE=${POST_MINUTE:-0}
      - TZ=${TZ:-Europe/Moscow}
